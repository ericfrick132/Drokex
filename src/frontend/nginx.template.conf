events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 10m;

    sendfile        on;
    keepalive_timeout  65;

    # Use Docker embedded DNS for resolving service names (e.g., drokex-api)
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    server {
        listen ${NGINX_PORT};
        server_name localhost;

        # Serve static build
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Ensure static assets never fall back to index.html
        location /static/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Handle API calls - proxy to backend
        location /api/ {
            # Upstream provided via env var; resolved via Docker DNS (127.0.0.11)
            set $api_upstream ${API_UPSTREAM};
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
