<svg width="400" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#4caf50;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Robot arm segments -->
  <g filter="url(#glow)">
    <!-- Base -->
    <circle cx="350" cy="550" r="25" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="2"/>

    <!-- Lower arm -->
    <rect x="340" y="400" width="20" height="150" rx="10" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="2"/>

    <!-- Joint -->
    <circle cx="350" cy="400" r="15" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="2"/>

    <!-- Upper arm -->
    <rect x="320" y="250" width="20" height="150" rx="10" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="2" transform="rotate(-20 330 325)"/>

    <!-- Hand joint -->
    <circle cx="310" cy="250" r="12" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="2"/>

    <!-- Hand/claw -->
    <g transform="translate(290,230) rotate(-30)">
      <rect x="0" y="0" width="15" height="40" rx="7" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="2"/>
      <rect x="-5" y="30" width="10" height="20" rx="5" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="1"/>
      <rect x="10" y="30" width="10" height="20" rx="5" fill="url(#robotGradient)" stroke="#4caf50" stroke-width="1"/>
    </g>

    <!-- Decorative elements -->
    <circle cx="350" cy="500" r="3" fill="#4caf50" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="350" r="3" fill="#4caf50" opacity="0.8">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>